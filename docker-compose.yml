version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: gloo-db
    restart: always
    environment:
      POSTGRES_USER: party_admin
      POSTGRES_PASSWORD: party_password123
      POSTGRES_DB: gloo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
name: GLOO CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dummy
          POSTGRES_PASSWORD: dummy
          POSTGRES_DB: dummy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy" #Just to satisfy Prisma during tests
      NEXT_PUBLIC_SUPABASE_URL: "https://dummy-project.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-anon-key-for-testing-purposes"
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - name: Block Copyleft Licenses (GPL/AGPL)
        run: npx --yes license-checker --failOn "GPL;GPL-1.0;GPL-2.0;GPL-3.0;AGPL;AGPL-1.0;AGPL-3.0"

      - name: Data Privacy & Security Scan (Bearer)
        uses: bearer/bearer-action@v2
        with:
          severity: high,critical

      - name: Strict Dependency Security Audit
        run: npm audit --audit-level=high --omit=dev
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run test:ci
      - run: npm run build